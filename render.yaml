services:
  - type: web
    name: portfolio-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: true
      - key: GEMINI_API_KEY
        sync: true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://vaishnavi-ai-dashboard.vercel.app
